name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"

jobs:
  automated-tests:
    name: Automated tests (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
            test-command: bash scripts/linux/test.sh
          - os: macos
            runner: macos-latest
            test-command: bash scripts/macos/test.sh
          - os: windows
            runner: windows-latest
            test-command: pwsh scripts/windows/test.ps1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux Tauri prerequisites
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JavaScript dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Run automated test script
        run: ${{ matrix.test-command }}

  ui-tests:
    name: UI/E2E tests (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
            ui-web-command: bash scripts/linux/test-ui.sh web
            ui-desktop-command: bash scripts/linux/test-ui.sh desktop
          - os: macos
            runner: macos-latest
            ui-web-command: bash scripts/macos/test-ui.sh web
            ui-desktop-command: bash scripts/macos/test-ui.sh desktop
          - os: windows
            runner: windows-latest
            ui-web-command: pwsh scripts/windows/test-ui.ps1 web
            ui-desktop-command: pwsh scripts/windows/test-ui.ps1 desktop

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux UI prerequisites
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            webkit2gtk-driver \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install tauri-driver
        if: matrix.os == 'linux' || matrix.os == 'windows'
        run: cargo install tauri-driver --locked

      - name: Install JavaScript dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Install Linux Playwright dependencies
        if: matrix.os == 'linux'
        run: corepack pnpm exec playwright install-deps chromium

      - name: Install Playwright browser
        run: corepack pnpm exec playwright install chromium

      - name: Enable macOS UI automation
        if: matrix.os == 'macos'
        run: sudo /usr/sbin/DevToolsSecurity -enable

      - name: Run Web UI tests
        run: ${{ matrix.ui-web-command }}

      - name: Run Desktop UI tests
        run: ${{ matrix.ui-desktop-command }}

  build-web:
    name: Build Web
    runs-on: ubuntu-22.04
    needs:
      - automated-tests
      - ui-tests
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Install JavaScript dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build Web app
        run: corepack pnpm build:web

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: crosslog-web
          path: apps/web/dist
          if-no-files-found: error

  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    needs:
      - automated-tests
      - ui-tests
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runner: ubuntu-22.04
            build-command: bash scripts/linux/build-desktop.sh
          - os: macos
            runner: macos-latest
            build-command: bash scripts/macos/build-desktop.sh
          - os: windows
            runner: windows-latest
            build-command: pwsh scripts/windows/build-desktop.ps1

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Enable Corepack
        run: corepack enable

      - name: Resolve pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(corepack pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: pnpm-${{ runner.os }}-

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install Linux Tauri prerequisites
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JavaScript dependencies
        run: corepack pnpm install --frozen-lockfile

      - name: Build Desktop app
        run: ${{ matrix.build-command }}

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: crosslog-desktop-${{ matrix.os }}
          path: |
            apps/desktop/src-tauri/target/release/crosslog-desktop
            apps/desktop/src-tauri/target/release/crosslog-desktop.exe
            apps/desktop/src-tauri/target/release/bundle/**
          if-no-files-found: error
